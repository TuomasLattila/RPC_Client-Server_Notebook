syntax = "proto3";

option csharp_namespace = "GrpcNotebookService";

package note;

service NoteService {
	rpc CreateNote (NoteRequest) returns (NoteReply);
}

message NoteRequest {
	string topic = 1;
	string title = 2;
	string text = 3;
	string timestamp = 4;
}

message NoteReply {
	string message = 1;
}