syntax = "proto3";

option csharp_namespace = "GrpcNotebookService";

package note;

service NoteService {
	rpc CreateNote (NoteRequest) returns (NoteReply);
	rpc GetTopics (GetTopicsRequest) returns (GetTopicsReply);
	rpc GetNotesPerTopic (GetNotesPerTopicRequest) returns (GetNotesPerTopicReply);
}

//CreateNote
////////////////////////////////////////////////////////////////////////////////////////////

message NoteRequest {
	string topic = 1;
	string title = 2;
	string text = 3;
	string timestamp = 4;
}

message NoteReply {
	string message = 1;
}

//GetTopics
////////////////////////////////////////////////////////////////////////////////////////////

message GetTopicsRequest {
}

message GetTopicsReply {
	repeated string topics = 1;
}

//GetNotesPerTopic
////////////////////////////////////////////////////////////////////////////////////////////

message GetNotesPerTopicRequest {
	string topic = 1;
}

message GetNotesPerTopicReply {
	repeated NoteRequest notes = 1;
}